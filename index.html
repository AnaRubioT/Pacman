<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pac-Man</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: "Courier New", monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    h1 {
      color: #ffcc00;
      letter-spacing: 4px;
      margin: 16px 0 8px;
    }
    #hud {
      display: flex;
      gap: 40px;
      font-size: 20px;
      margin-bottom: 10px;
      color: #ffcc00;
    }
    canvas {
      background: #000;
      border: 2px solid #2121de;
      box-shadow: 0 0 24px rgba(33, 33, 222, 0.6);
    }
    #message {
      height: 28px;
      font-size: 22px;
      margin-top: 12px;
      color: #ff5555;
    }
    #hint {
      font-size: 14px;
      color: #888;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>PAC-MAN</h1>
  <div id="hud">
    <div>SCORE: <span id="score">0</span></div>
    <div>LIVES: <span id="lives">3</span></div>
  </div>
  <canvas id="game"></canvas>
  <div id="message"></div>
  <div id="hint">Arrow keys or WASD to move &middot; Press SPACE to start / restart</div>
  <script>
(function () {
  "use strict";
  const MAZE = [
    "############################",
    "#............##............#",
    "#.####.#####.##.#####.####.#",
    "#o####.#####.##.#####.####o#",
    "#.####.#####.##.#####.####.#",
    "#..........................#",
    "#.####.##.########.##.####.#",
    "#.####.##.########.##.####.#",
    "#......##....##....##......#",
    "######.##### ## #####.######",
    "######.##### ## #####.######",
    "######.##          ##.######",
    "######.## ###--### ##.######",
    "######.## #GGGGGG# ##.######",
    "      .   #GGGGGG#   .      ",
    "######.## ######## ##.######",
    "######.##          ##.######",
    "######.## ######## ##.######",
    "######.## ######## ##.######",
    "#............##............#",
    "#.####.#####.##.#####.####.#",
    "#.####.#####.##.#####.####.#",
    "#o..##................##..o#",
    "###.##.##.########.##.##.###",
    "###.##.##.########.##.##.###",
    "#......##....##....##......#",
    "#.##########.##.##########.#",
    "#.##########.##.##########.#",
    "#..........................#",
    "############################",
  ];
  const TILE = 20;
  const ROWS = MAZE.length;
  const COLS = MAZE[0].length;
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  canvas.width = COLS * TILE;
  canvas.height = ROWS * TILE;
  const scoreEl = document.getElementById("score");
  const livesEl = document.getElementById("lives");
  const messageEl = document.getElementById("message");
  const DIRS = {
    up: { x: 0, y: -1 },
    down: { x: 0, y: 1 },
    left: { x: -1, y: 0 },
    right: { x: 1, y: 0 },
    none: { x: 0, y: 0 },
  };
  let grid;
  let pacman;
  let ghosts;
  let score;
  let lives;
  let pelletsLeft;
  let state;
  let frightenedTimer;
  let animTick;
  function isWall(col, row) {
    if (row < 0 || row >= ROWS) return true;
    if (col < 0 || col >= COLS) return false;
    return grid[row][col] === "#" || grid[row][col] === "-";
  }
  function resetLevel(fullReset) {
    grid = MAZE.map((line) => line.split(""));
    pelletsLeft = 0;
    let pacStart = { col: 13.5, row: 23 };
    const ghostStarts = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const ch = grid[r][c];
        if (ch === ".") pelletsLeft++;
        if (ch === "o") pelletsLeft++;
        if (ch === "G") {
          ghostStarts.push({ col: c, row: r });
          grid[r][c] = " ";
        }
      }
    }
    pacman = {
      col: pacStart.col,
      row: pacStart.row,
      dir: "left",
      nextDir: "left",
      speed: 0.12,
      mouth: 0,
    };
    const colors = ["#ff0000", "#ffb8ff", "#00ffff", "#ffb852"];
    const names = ["blinky", "pinky", "inky", "clyde"];
    ghosts = colors.map((color, i) => {
      const start = ghostStarts[i % ghostStarts.length] || { col: 13, row: 14 };
      return {
        name: names[i],
        color,
        startCol: start.col,
        startRow: start.row,
        col: start.col,
        row: start.row,
        dir: "up",
        speed: 0.09,
        frightened: false,
        eaten: false,
      };
    });
    frightenedTimer = 0;
    if (fullReset) {
      score = 0;
      lives = 3;
    }
    updateHud();
  }
  function updateHud() {
    scoreEl.textContent = score;
    livesEl.textContent = lives;
  }
  function setMessage(text) {
    messageEl.textContent = text;
  }
  function atTileCenter(entity) {
    const fx = entity.col - Math.round(entity.col);
    const fy = entity.row - Math.round(entity.row);
    return Math.abs(fx) < 0.05 && Math.abs(fy) < 0.05;
  }
  function snap(entity) {
    entity.col = Math.round(entity.col);
    entity.row = Math.round(entity.row);
  }
  function wrap(entity) {
    if (entity.col < -0.5) entity.col = COLS - 0.5;
    if (entity.col > COLS - 0.5) entity.col = -0.5;
  }
  function canMove(entity, dir) {
    const d = DIRS[dir];
    const nc = Math.round(entity.col) + d.x;
    const nr = Math.round(entity.row) + d.y;
    return !isWall(nc, nr);
  }
  function moveEntity(entity) {
    const d = DIRS[entity.dir];
    entity.col += d.x * entity.speed;
    entity.row += d.y * entity.speed;
    wrap(entity);
  }
  function updatePacman() {
    if (atTileCenter(pacman)) {
      snap(pacman);
      if (pacman.nextDir !== pacman.dir && canMove(pacman, pacman.nextDir)) {
        pacman.dir = pacman.nextDir;
      }
      if (!canMove(pacman, pacman.dir)) {
        pacman.dir = "none";
      }
    }
    moveEntity(pacman);
    const col = Math.round(pacman.col);
    const row = Math.round(pacman.row);
    if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
      const ch = grid[row][col];
      if (ch === ".") {
        grid[row][col] = " ";
        score += 10;
        pelletsLeft--;
        updateHud();
      } else if (ch === "o") {
        grid[row][col] = " ";
        score += 50;
        pelletsLeft--;
        frightenedTimer = 7 * 60;
        ghosts.forEach((g) => {
          if (!g.eaten) g.frightened = true;
        });
        updateHud();
      }
    }
    if (pelletsLeft <= 0) {
      state = "win";
      setMessage("YOU WIN!  Press SPACE");
    }
  }
  function ghostTargetDir(ghost) {
    const options = ["up", "down", "left", "right"].filter((dir) => {
      if (!canMove(ghost, dir)) return false;
      const opp = { up: "down", down: "up", left: "right", right: "left" };
      return dir !== opp[ghost.dir];
    });
    if (options.length === 0) {
      const opp = { up: "down", down: "up", left: "right", right: "left" };
      return opp[ghost.dir];
    }
    let target;
    if (ghost.eaten) {
      target = { col: ghost.startCol, row: ghost.startRow };
    } else if (ghost.frightened) {
      return options[Math.floor(Math.random() * options.length)];
    } else {
      target = ghostChaseTarget(ghost);
    }
    let best = options[0];
    let bestDist = Infinity;
    for (const dir of options) {
      const d = DIRS[dir];
      const nc = Math.round(ghost.col) + d.x;
      const nr = Math.round(ghost.row) + d.y;
      const dist = (nc - target.col) ** 2 + (nr - target.row) ** 2;
      if (dist < bestDist) {
        bestDist = dist;
        best = dir;
      }
    }
    return best;
  }
  function ghostChaseTarget(ghost) {
    const pd = DIRS[pacman.dir];
    switch (ghost.name) {
      case "blinky":
        return { col: pacman.col, row: pacman.row };
      case "pinky":
        return { col: pacman.col + pd.x * 4, row: pacman.row + pd.y * 4 };
      case "inky":
        return { col: pacman.col + pd.x * 2, row: pacman.row + pd.y * 2 };
      case "clyde": {
        const dist =
          (ghost.col - pacman.col) ** 2 + (ghost.row - pacman.row) ** 2;
        if (dist > 64) return { col: pacman.col, row: pacman.row };
        return { col: 1, row: ROWS - 2 };
      }
      default:
        return { col: pacman.col, row: pacman.row };
    }
  }
  function updateGhost(ghost) {
    ghost.speed = ghost.frightened ? 0.055 : ghost.eaten ? 0.16 : 0.085;
    if (atTileCenter(ghost)) {
      snap(ghost);
      ghost.dir = ghostTargetDir(ghost);
      if (
        ghost.eaten &&
        Math.round(ghost.col) === ghost.startCol &&
        Math.round(ghost.row) === ghost.startRow
      ) {
        ghost.eaten = false;
        ghost.frightened = false;
      }
    }
    moveEntity(ghost);
  }
  function checkCollisions() {
    for (const ghost of ghosts) {
      const dist =
        Math.abs(ghost.col - pacman.col) + Math.abs(ghost.row - pacman.row);
      if (dist < 0.7) {
        if (ghost.frightened && !ghost.eaten) {
          ghost.eaten = true;
          ghost.frightened = false;
          score += 200;
          updateHud();
        } else if (!ghost.eaten) {
          loseLife();
          return;
        }
      }
    }
  }
  function loseLife() {
    lives--;
    updateHud();
    if (lives <= 0) {
      state = "gameover";
      setMessage("GAME OVER  Press SPACE");
    } else {
      state = "dead";
      setMessage("Caught!  Press SPACE");
    }
  }
  function respawn() {
    pacman.col = 13.5;
    pacman.row = 23;
    pacman.dir = "left";
    pacman.nextDir = "left";
    ghosts.forEach((g) => {
      g.col = g.startCol;
      g.row = g.startRow;
      g.dir = "up";
      g.frightened = false;
      g.eaten = false;
    });
    frightenedTimer = 0;
  }
  function update() {
    if (state !== "playing") return;
    updatePacman();
    if (state !== "playing") return;
    ghosts.forEach(updateGhost);
    checkCollisions();
    if (frightenedTimer > 0) {
      frightenedTimer--;
      if (frightenedTimer === 0) {
        ghosts.forEach((g) => (g.frightened = false));
      }
    }
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const ch = grid[r][c];
        const x = c * TILE;
        const y = r * TILE;
        if (ch === "#") {
          ctx.fillStyle = "#1111aa";
          ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
        } else if (ch === "-") {
          ctx.fillStyle = "#ffb8ff";
          ctx.fillRect(x, y + TILE / 2 - 1, TILE, 2);
        } else if (ch === ".") {
          ctx.fillStyle = "#ffcc99";
          ctx.beginPath();
          ctx.arc(x + TILE / 2, y + TILE / 2, 2, 0, Math.PI * 2);
          ctx.fill();
        } else if (ch === "o") {
          ctx.fillStyle = "#ffcc99";
          ctx.beginPath();
          const pulse = 4 + Math.sin(animTick * 0.2) * 1.5;
          ctx.arc(x + TILE / 2, y + TILE / 2, pulse, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
    drawPacman();
    ghosts.forEach(drawGhost);
  }
  function drawPacman() {
    const x = pacman.col * TILE + TILE / 2;
    const y = pacman.row * TILE + TILE / 2;
    const r = TILE / 2 - 1;
    let angle = 0;
    if (pacman.dir === "right") angle = 0;
    if (pacman.dir === "left") angle = Math.PI;
    if (pacman.dir === "up") angle = -Math.PI / 2;
    if (pacman.dir === "down") angle = Math.PI / 2;
    const mouth =
      state === "playing"
        ? Math.abs(Math.sin(animTick * 0.3)) * 0.3
        : 0.2;
    ctx.fillStyle = "#ffff00";
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.arc(x, y, r, angle + mouth, angle + Math.PI * 2 - mouth);
    ctx.closePath();
    ctx.fill();
  }
  function drawGhost(ghost) {
    const x = ghost.col * TILE + TILE / 2;
    const y = ghost.row * TILE + TILE / 2;
    const r = TILE / 2 - 1;
    let bodyColor = ghost.color;
    if (ghost.eaten) {
      bodyColor = "rgba(255,255,255,0.15)";
    } else if (ghost.frightened) {
      const flashing = frightenedTimer < 120 && Math.floor(animTick / 10) % 2;
      bodyColor = flashing ? "#ffffff" : "#2121ff";
    }
    if (!ghost.eaten) {
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.arc(x, y - 1, r, Math.PI, 0);
      ctx.lineTo(x + r, y + r);
      const feet = 3;
      for (let i = 0; i < feet; i++) {
        const fx = x + r - ((i + 0.5) * (2 * r)) / feet;
        ctx.lineTo(fx, y + r - 3);
        ctx.lineTo(fx - r / feet, y + r);
      }
      ctx.lineTo(x - r, y + r);
      ctx.closePath();
      ctx.fill();
    }
    const ex = ghost.frightened && !ghost.eaten ? 0 : DIRS[ghost.dir].x;
    const ey = ghost.frightened && !ghost.eaten ? 0 : DIRS[ghost.dir].y;
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(x - 4, y - 2, 3, 0, Math.PI * 2);
    ctx.arc(x + 4, y - 2, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = ghost.frightened && !ghost.eaten ? "#ff0000" : "#0000ff";
    ctx.beginPath();
    ctx.arc(x - 4 + ex * 1.5, y - 2 + ey * 1.5, 1.5, 0, Math.PI * 2);
    ctx.arc(x + 4 + ex * 1.5, y - 2 + ey * 1.5, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
  function loop() {
    animTick++;
    update();
    draw();
    requestAnimationFrame(loop);
  }
  document.addEventListener("keydown", (e) => {
    switch (e.key) {
      case "ArrowUp":
      case "w":
      case "W":
        pacman.nextDir = "up";
        e.preventDefault();
        break;
      case "ArrowDown":
      case "s":
      case "S":
        pacman.nextDir = "down";
        e.preventDefault();
        break;
      case "ArrowLeft":
      case "a":
      case "A":
        pacman.nextDir = "left";
        e.preventDefault();
        break;
      case "ArrowRight":
      case "d":
      case "D":
        pacman.nextDir = "right";
        e.preventDefault();
        break;
      case " ":
        handleSpace();
        e.preventDefault();
        break;
    }
  });
  function handleSpace() {
    if (state === "ready") {
      state = "playing";
      setMessage("");
    } else if (state === "dead") {
      respawn();
      state = "playing";
      setMessage("");
    } else if (state === "win" || state === "gameover") {
      resetLevel(true);
      state = "playing";
      setMessage("");
    }
  }
  animTick++;
  resetLevel(true);
  state = "ready";
  setMessage("Press SPACE to start");
  loop();
})();
  </script>
</body>
</html>
